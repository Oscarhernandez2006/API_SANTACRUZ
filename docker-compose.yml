services:
  api:
    build: .
    image: api-consultas:latest
    container_name: api-consultas
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_SERVER: ${DB_SERVER}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER:-ODBC Driver 18 for SQL Server}
